# ============================================================================
# VeloIQ Framework default configuration (jm_config.ini)
# ----------------------------------------------------------------------------
# Minimal defaults shipped with the VeloIQ framework. Shipped alongside
# veloiq_framework/utils/data_mgmt_utils.py so that jm_obtain_config() has
# base values for [logging] and [views] even when the IQVigilant NLP extension
# is not installed.
#
# A host app or extension (e.g. the IQVigilant NLP module) provides a richer
# jm_config.ini that overrides these values. Resolution order:
#   1. This file (veloiq_framework/jm_config.ini)
#   2. config/jm_config.ini in the host app working directory
#   3. jm_config.ini in the host app working directory
#   4. jm_config.ini in the current working directory
# ============================================================================

[logging]
log_up_to_relevance = 2

[views]
show_back_of_cards = true
plain_color_base_hex = "#1e708a"
